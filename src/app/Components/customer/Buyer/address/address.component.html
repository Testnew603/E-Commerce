<form class="address-form" #addressForm="ngForm" (ngSubmit)="createAddress(allAdresses)">
  <mat-form-field appearance="fill">
    <mat-label>Address Line 1</mat-label>
    <input matInput name="addLine1" [(ngModel)]="allAdresses.addLine1" required>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Address Line 2</mat-label>
    <input matInput name="addLine2" [(ngModel)]="allAdresses.addLine2">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>City</mat-label>
    <input matInput name="city" [(ngModel)]="allAdresses.city" required>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>State</mat-label>
    <input matInput name="state" [(ngModel)]="allAdresses.state" required>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Zip Code</mat-label>
    <input matInput name="zipCode" [(ngModel)]="allAdresses.zipCode" required>
  </mat-form-field>

  <div>
    <button mat-raised-button color="primary" type="submit">{{ isEditMode ? 'Update Address' : 'Create Address' }}</button>
    <button mat-raised-button color="warn" *ngIf="isEditMode" (click)="getAddressById()">Cancel</button>
  </div>
</form>
