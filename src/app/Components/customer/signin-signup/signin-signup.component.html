<div class="container">
	<div class="col-md-6 col-md-offset-3 loginBox">
	  <h3 class="center-text">Log In</h3>
	  <p>{{ message }}</p>
	  <form [formGroup]="loginForm">
		<div class="form-group clearfix">
		  <!-- <label class="col-md-3 col-sm-5 col-xs-12" for="userid">Userid</label> -->
		  <div class="col-md-9 col-sm-7 col-xs-12">
			<mat-form-field appearance="fill">
			  <mat-label>Userid</mat-label>
			  <input matInput formControlName="username" type="text">
			  <mat-error>Userid is required</mat-error>
			</mat-form-field>
		  </div>
		</div>
		<div class="form-group clearfix">
		  <!-- <label class="col-md-3 col-sm-5 col-xs-12" for="password">Password</label> -->
		  <div class="col-md-9 col-sm-7 col-xs-12">
			<mat-form-field appearance="fill">
			  <mat-label>Password</mat-label>
			  <input matInput formControlName="password" type="password">
			  <mat-error>Password is required</mat-error>
			</mat-form-field>
		  </div>
		</div>
		<div class="col-xs-12 form-group text-right">
		  <button mat-button color="primary" type="button" (click)="login()">Login</button>
		  <button mat-button color="primary" type="button" (click)="resetlogin()">Reset</button>
		</div>
	  </form>
	</div>
  </div>
