<div class="container1">
  <div class="header">
    <app-header-admin></app-header-admin>
  </div>
  <div class="main-container">
    <div class="side-nav" style="width: 250px">
      <app-side-nav></app-side-nav>
    </div>
    <div class="main">
      <section class="p-3">
        <div class="row">
          <div class="col-12">
            <button
              class="btn btn-primary newUser"
              data-bs-toggle="modal"
              data-bs-target="#userForm" (click)="openDialogBox()">
              Add Product + <i class="bi bi-people"></i>
            </button>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <table
              class="table table-striped table-hover mt-3 text-center table-bordered">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Price</th>
                  <th>Color</th>
                  <th>Quantity</th>
                  <th>Available</th>
                  <th>Image</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody id="data" *ngFor="let product of products">
                <tr>
                    <td> {{ product.id }} </td>
                    <td> {{ product.name }} </td>
                    <td> {{ product.color }} </td>
                    <td> {{ product.price }} </td>
                    <td> {{ product.quantity }} </td>
                    <td> {{ product.available }} </td>
                    <td> {{ product.image }} </td>
                    <td> <button> Edit </button> <br> <button>Remove</button> </td>

                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!--Modal Form-->
      <div class="modal fade" id="userForm">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h4 class="modal-title">Fill the Form</h4>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>

            <div class="modal-body">
              <form action="#" id="myForm">
                <div class="card imgholder">
                  <label for="imgInput" class="upload">
                    <input type="file" name="" id="imgInput" />
                    <i class="bi bi-plus-circle-dotted"></i>
                  </label>
                  <img
                    src="./image/Profile Icon.webp"
                    alt=""
                    width="200"
                    height="200"
                    class="img"
                  />
                </div>

                <div class="inputField">
                  <div>
                    <label for="name">Name:</label>
                    <input type="text" name="" id="name" required />
                  </div>
                  <div>
                    <label for="age">Price:</label>
                    <input type="number" name="" id="age" required />
                  </div>
                  <div>
                    <label for="city">Color:</label>
                    <input type="text" name="" id="city" required />
                  </div>
                  <div>
                    <label for="email">Quantity:</label>
                    <input type="email" name="" id="email" required />
                  </div>
                  <div>
                    <label for="phone">Available:</label>
                    <input
                      type="text"
                      name=""
                      id="phone"
                      minlength="11"
                      maxlength="11"
                      required
                    />
                  </div>
                  <div>
                    <label for="post">Image:</label>
                    <input type="text" name="" id="post" required />
                  </div>
                </div>
              </form>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Close
              </button>
              <button
                type="submit"
                form="myForm"
                class="btn btn-primary submit">
                Submit
              </button>
            </div>
          </div>
        </div>
      </div>

      <!--Read Data Modal-->
      <div class="modal fade" id="readData">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h4 class="modal-title">Profile</h4>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>

            <div class="modal-body">
              <form action="#" id="myForm">
                <div class="card imgholder">
                  <img
                    src="./image/Profile Icon.webp"
                    alt=""
                    width="200"
                    height="200"
                    class="showImg"
                  />
                </div>

                <div class="inputField">
                  <div>
                    <label for="name">Name:</label>
                    <input type="text" name="" id="showName" disabled />
                  </div>
                  <div>
                    <label for="age">Price:</label>
                    <input type="number" name="" id="showAge" disabled />
                  </div>
                  <div>
                    <label for="city">Color:</label>
                    <input type="text" name="" id="showCity" disabled />
                  </div>
                  <div>
                    <label for="email">Quantity:</label>
                    <input type="email" name="" id="showEmail" disabled />
                  </div>
                  <div>
                    <label for="phone">Available:</label>
                    <input
                      type="text"
                      name=""
                      id="showPhone"
                      minlength="11"
                      maxlength="11"
                      disabled
                    />
                  </div>
                  <div>
                    <label for="post">Image:</label>
                    <input type="text" name="" id="showPost" disabled />
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
